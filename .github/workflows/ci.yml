name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-latest
            build_type: Debug
            sanitizers: ON
          - os: ubuntu-latest
            build_type: Release
            sanitizers: OFF
          - os: macos-latest
            build_type: Debug
            sanitizers: OFF
          - os: macos-latest
            build_type: Release
            sanitizers: OFF
          - os: windows-latest
            build_type: Debug
            sanitizers: OFF
          - os: windows-latest
            build_type: Release
            sanitizers: OFF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: pae/build/_deps
          key: deps-${{ matrix.os }}-${{ hashFiles('pae/CMakeLists.txt', 'pae/tests/CMakeLists.txt') }}

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B pae/build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPAE_SANITIZERS=${{ matrix.sanitizers }}

      - name: Build
        shell: bash
        run: cmake --build pae/build -j --config ${{ matrix.build_type }}

      - name: Test (ctest)
        shell: bash
        working-directory: pae/build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Upload test logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ctest-logs-${{ matrix.os }}-${{ matrix.build_type }}
          path: pae/build/Testing/Temporary/

  perf-budget:
    name: Performance budget (Linux Release)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: pae/build-rel/_deps
          key: deps-perf-${{ hashFiles('pae/CMakeLists.txt') }}

      - name: Configure (Release + perf budgets)
        run: |
          cmake -S . -B pae/build-rel \
            -DCMAKE_BUILD_TYPE=Release \
            -DPAE_PERF_BUDGET=ON

      - name: Build (Release)
        run: cmake --build pae/build-rel -j

      - name: Run perf-budget tests
        run: ctest --test-dir pae/build-rel -L perf --output-on-failure
